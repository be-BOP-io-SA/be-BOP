journey_id: "journey-25"
title: "Reports and analytics"
persona: "owner"
description: "Use the reporting dashboard to review order, product, and payment analytics and export data as CSV"
prerequisites:
  - "Admin access to the store"
  - "At least a few completed orders (to have meaningful data to review)"
steps:
  - id: "step-1"
    feature_id: "A106"
    title: "Open the reporting dashboard"
    description: "Navigate to the reporting page to view the dashboard overview with key metrics"
    navigation: "/admin/reporting"
    ui_action: "scroll"
    ui_target: "reporting dashboard overview"
    tip: "The dashboard gives you a high-level snapshot of store performance at a glance"

  - id: "step-2"
    feature_id: "A106"
    title: "Select reporting period"
    description: "Select the desired period (monthly or annual) to filter the data displayed across all report sections"
    navigation: "/admin/reporting"
    ui_action: "select"
    ui_target: "select[name='period'] (monthly / annual)"
    tip: "Switch between monthly and annual views to spot short-term trends or long-term growth patterns"

  - id: "step-3"
    feature_id: "A106"
    title: "Review order details"
    description: "Review the Order Detail section showing order amounts, order counts, and trends over the selected period"
    navigation: "/admin/reporting"
    ui_action: "scroll"
    ui_target: "Order Detail section"
    tip: "Look for spikes or dips in order volume to correlate with marketing campaigns or seasonal patterns"

  - id: "step-4"
    feature_id: "A106"
    title: "Review product details"
    description: "Review the Product Detail section showing sales performance broken down by individual product"
    navigation: "/admin/reporting"
    ui_action: "scroll"
    ui_target: "Product Detail section"
    tip: "Identify your best-selling and underperforming products to inform inventory and marketing decisions"

  - id: "step-5"
    feature_id: "A106"
    title: "Review payment details"
    description: "Review the Payment Detail section showing a breakdown of revenue by payment method"
    navigation: "/admin/reporting"
    ui_action: "scroll"
    ui_target: "Payment Detail section"
    tip: "Understanding payment method preferences helps you optimize checkout options for your customers"

  - id: "step-6"
    feature_id: "A106"
    title: "Export data as CSV"
    description: "Click the Export CSV button on any section to download the underlying data for further analysis in a spreadsheet"
    navigation: "/admin/reporting"
    ui_action: "click"
    ui_target: "button.export-csv"
    tip: "CSV exports are useful for accounting, tax reporting, or importing into external analytics tools"
