journey_id: "journey-18"
title: "Configure emails and notifications"
persona: "owner"
description: "Set up SMTP, customize email templates, send test emails, and enable admin notifications"
prerequisites:
  - "Admin access to the back-office"
  - "SMTP server credentials from your email provider"
steps:
  - id: "step-1"
    feature_id: "A103"
    title: "Configure SMTP settings"
    description: "Navigate to SMTP configuration, fill in Host, Port, Username, Password, From email, and From name, then click Update"
    navigation: "/admin/smtp"
    ui_action: "fill"
    ui_target: "input[name='host'], input[name='port'], input[name='username'], input[name='password'], input[name='fromEmail'], input[name='fromName']"
    tip: "Common ports are 587 for TLS and 465 for SSL"

  - id: "step-2"
    feature_id: "A87"
    title: "Customize an email template"
    description: "Navigate to templates, select a template (e.g. order.payment.paid), fill in the Subject line, and edit the HTML body using available variables like {{orderNumber}} and {{invoiceLink}}"
    navigation: "/admin/template"
    ui_action: "fill"
    ui_target: "select[name='template'], input[name='subject'], textarea[name='body']"
    tip: "Available variables are listed below the editor; use them to personalize each email"

  - id: "step-3"
    feature_id: "A88"
    title: "Reset a template to default"
    description: "Click the Reset to default button to restore the original template content"
    navigation: "/admin/template"
    ui_action: "click"
    ui_target: "button.reset-template"
    tip: "This is useful if a customization breaks the email layout"

  - id: "step-4"
    feature_id: "A104"
    title: "Send a test email"
    description: "Navigate to the email page and click Send test email to verify your SMTP configuration"
    navigation: "/admin/email"
    ui_action: "click"
    ui_target: "button.send-test-email"
    tip: "Check your spam folder if the test email does not arrive in your inbox"

  - id: "step-5"
    feature_id: "A69"
    title: "Enable admin order email copies"
    description: "Navigate to configuration and check the option to send a copy of every order email to the admin address"
    navigation: "/admin/config"
    ui_action: "check"
    ui_target: "input[name='sendOrderEmailCopyToAdmin']"
    tip: "This keeps you informed of every completed order without checking the dashboard"
