journey_id: "journey-19"
title: "Configure Nostr for notifications and commerce"
persona: "owner"
description: "Generate Nostr keys, configure relays, certify identity, and customize the Nostr bot"
prerequisites:
  - "Admin access to the back-office"
  - "Access to the server .env file for storing the private key"
steps:
  - id: "step-1"
    feature_id: "A105"
    title: "Create a Nostr private key"
    description: "Navigate to Nostr configuration and click Create NostR private key to generate a new keypair"
    navigation: "/admin/nostr"
    ui_action: "click"
    ui_target: "button.create-nostr-key"
    tip: "This generates both an nsec (private) and npub (public) key for your store"

  - id: "step-2"
    feature_id: "A105"
    title: "Store the private key in environment"
    description: "Copy the nsec key displayed on screen and add it to your .env file as NOSTR_PRIVATE_KEY"
    navigation: "/admin/nostr"
    ui_action: "fill"
    ui_target: ".env file: NOSTR_PRIVATE_KEY=nsec..."
    tip: "Keep this key secret; anyone with access to it can impersonate your store on Nostr"

  - id: "step-3"
    feature_id: "A105"
    title: "Configure relay list"
    description: "Add relay URLs (wss://...) to the relay list and click Update relay list to save"
    navigation: "/admin/nostr"
    ui_action: "fill"
    ui_target: "input[name='relayUrl'], button.update-relay-list"
    tip: "Add multiple relays for redundancy; popular choices include wss://relay.damus.io and wss://nos.lol"

  - id: "step-4"
    feature_id: "A105"
    title: "Certify your Nostr identity"
    description: "Click Certify to validate your npub with your store name, logo, and domain via NIP-05"
    navigation: "/admin/nostr"
    ui_action: "click"
    ui_target: "button.certify-nostr"
    tip: "Certification helps customers verify they are communicating with your official store account"

  - id: "step-5"
    feature_id: "A105"
    title: "Customize the Nostr bot intro message"
    description: "Edit the intro message text or check Disable Nostr-bot intro message to turn it off"
    navigation: "/admin/nostr"
    ui_action: "fill"
    ui_target: "textarea[name='introMessage'], input[name='disableIntroMessage']"
    tip: "The intro message is sent automatically when a customer first contacts your store via Nostr"
