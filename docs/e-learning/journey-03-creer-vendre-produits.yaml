journey_id: "journey-03"
title: "Create and sell products"
persona: "owner"
description: "Add a product to the catalog with pricing, variations, images, stock, delivery, VAT, channel visibility, and translations."
prerequisites:
  - "Completed journey-01 (shop setup)"
  - "At least one currency configured (A57)"
  - "At least one VAT profile available (A58)"
  - "S3 storage configured for image uploads (A92)"

steps:
  - id: "step-1"
    feature_id: "A01"
    title: "Create a new product"
    description: "Open the product management page and start adding a new product with its basic identifiers."
    navigation: "/admin/product"
    ui_action: "click"
    ui_target: "button.add-product"
    tip: "The slug becomes part of the product URL. Keep it short, lowercase, and hyphen-separated."

  - id: "step-2"
    feature_id: "A01"
    title: "Fill product identifiers"
    description: "Enter the product name, URL slug, optional alias, and select the product type."
    navigation: "/admin/product/new"
    ui_action: "fill"
    ui_target: "form.product-form"
    fields:
      - "Product name"
      - "Slug"
      - "Alias"
      - "Type (select)"

  - id: "step-3"
    feature_id: "A02"
    title: "Fill product descriptions and metadata"
    description: "Write the short description (shown in listings) and full description (shown on the product page). Add tags and set availability."
    navigation: "/admin/product/new"
    ui_action: "fill"
    ui_target: "textarea[name='shortDescription'], textarea[name='description'], input[name='tags'], input[name='availableDate'], input[name='maxQuantityPerOrder']"
    fields:
      - "Short description"
      - "Description"
      - "Product Tags"
      - "Available date"
      - "Max quantity per order"
    tip: "Tags are used for catalog filtering. Separate multiple tags with commas."

  - id: "step-4"
    feature_id: "A03"
    title: "Set pricing"
    description: "Enter the price amount, select the currency, and optionally mark the product as free, pay-what-you-want, or standalone."
    navigation: "/admin/product/new"
    ui_action: "fill"
    ui_target: "input[name='priceAmount'], select[name='priceCurrency']"
    fields:
      - "Price Amount"
      - "Price Currency (select)"
    tip: "Pay-what-you-want lets customers choose their price above a minimum you set."

  - id: "step-5"
    feature_id: "A03"
    title: "Toggle pricing options"
    description: "Check or uncheck free, pay-what-you-want, and standalone options as needed."
    navigation: "/admin/product/new"
    ui_action: "check"
    ui_target: "input[name='free'], input[name='payWhatYouWant'], input[name='standalone']"

  - id: "step-6"
    feature_id: "A07"
    title: "Add product variations"
    description: "Enable light variations and add variation entries with name, value, and price difference."
    navigation: "/admin/product/new"
    ui_action: "check"
    ui_target: "input[name='hasVariations']"
    tip: "Use variations for size, color, or other options. Each variation can adjust the base price up or down."

  - id: "step-7"
    feature_id: "A07"
    title: "Fill variation details"
    description: "For each variation, enter its name, value, and the price difference from the base price."
    navigation: "/admin/product/new"
    ui_action: "fill"
    ui_target: "div.variations input[name='variationName'], input[name='variationValue'], input[name='variationPriceDiff']"
    fields:
      - "Variation Name"
      - "Variation Value"
      - "Price difference"

  - id: "step-8"
    feature_id: "A08"
    title: "Upload product images"
    description: "Scroll to the picture section and upload one or more product images. Reorder them by drag-and-drop."
    navigation: "/admin/product/new"
    ui_action: "click"
    ui_target: "input[type='file'].image-upload"
    tip: "Use high-quality square images for consistent display across the catalog."

  - id: "step-9"
    feature_id: "A09"
    title: "Set default product image"
    description: "Drag the desired default image to the first position in the image list."
    navigation: "/admin/product/new"
    ui_action: "click"
    ui_target: "sortable-list.product-images"
    tip: "The first image is used as the thumbnail in catalog listings and search results."

  - id: "step-10"
    feature_id: "A05"
    title: "Configure stock"
    description: "Enable limited stock and enter the available quantity."
    navigation: "/admin/product/new"
    ui_action: "check"
    ui_target: "input[name='hasLimitedStock']"

  - id: "step-11"
    feature_id: "A05"
    title: "Set stock quantity"
    description: "Fill in the number of units available for sale."
    navigation: "/admin/product/new"
    ui_action: "fill"
    ui_target: "input[name='stockQuantity']"

  - id: "step-12"
    feature_id: "A27"
    title: "Enable physical delivery"
    description: "If the product has a physical component that needs shipping, check the physical delivery option."
    navigation: "/admin/product/new"
    ui_action: "check"
    ui_target: "input[name='hasPhysicalComponent']"
    tip: "Physical products require customers to enter a shipping address at checkout."

  - id: "step-13"
    feature_id: "A12"
    title: "Select VAT profile"
    description: "Choose the appropriate VAT rate for this product from the dropdown."
    navigation: "/admin/product/new"
    ui_action: "select"
    ui_target: "select[name='vatProfile']"
    tip: "VAT profiles are defined by the VAT regime selected in journey-01. Ensure the correct rate applies to your product category."

  - id: "step-14"
    feature_id: "A23"
    title: "Set channel visibility"
    description: "Toggle which sales channels display this product: Eshop, Retail, Google Shopping, Nostr-bot."
    navigation: "/admin/product/new"
    ui_action: "check"
    ui_target: "input[name='visibleOnEshop'], input[name='visibleOnRetail'], input[name='visibleOnGoogleShopping'], input[name='visibleOnNostrBot']"
    tip: "A product can be visible on multiple channels simultaneously."

  - id: "step-15"
    feature_id: "A28"
    title: "Add product translations"
    description: "For each enabled language, fill in the translated product name, short description, and full description."
    navigation: "/admin/product/new"
    ui_action: "fill"
    ui_target: "div.translations input, div.translations textarea"
    tip: "If you skip a translation, the default language text is used as fallback."
