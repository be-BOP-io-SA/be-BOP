journey_id: "journey-06"
title: "Manage account and preferences"
persona: "customer"
description: "Authenticate via email magic link, Nostr npub, or OAuth; manage sessions; update personal information; and configure newsletter preferences."
prerequisites:
  - "Access to the shop storefront"
  - "A valid email address, Nostr identity, or OAuth-supported account"

steps:
  - id: "step-1"
    feature_id: "C43"
    title: "Log in with email magic link"
    description: "Enter your email address on the login page, click send, then check your inbox for the magic link and click it to authenticate."
    navigation: "/login"
    ui_action: "fill"
    ui_target: "input[name='email']"
    tip: "The magic link expires after a short time. Check spam/junk folders if you do not receive it."

  - id: "step-2"
    feature_id: "C43"
    title: "Send magic link"
    description: "Click the send button to request the magic link email."
    navigation: "/login"
    ui_action: "click"
    ui_target: "button.send-magic-link"

  - id: "step-3"
    feature_id: "C44"
    title: "Log in with Nostr npub"
    description: "Enter your Nostr npub public key and click authenticate to log in using your Nostr identity."
    navigation: "/login"
    ui_action: "fill"
    ui_target: "input[name='npub']"
    tip: "Your npub is your public Nostr identity. It starts with 'npub1'."

  - id: "step-4"
    feature_id: "C44"
    title: "Authenticate with Nostr"
    description: "Click the authenticate button to complete Nostr login."
    navigation: "/login"
    ui_action: "click"
    ui_target: "button.nostr-auth"

  - id: "step-5"
    feature_id: "C45"
    title: "Log in with OAuth provider"
    description: "Click the button for your preferred OAuth provider (Google, Facebook, etc.) and authorize access in the popup."
    navigation: "/login"
    ui_action: "click"
    ui_target: "button.oauth-google, button.oauth-facebook"
    tip: "OAuth login creates an account automatically if one does not already exist for your email."

  - id: "step-6"
    feature_id: "C46"
    title: "Clear session"
    description: "Click the appropriate clear session button to log out from email, npub, or SSO sessions."
    navigation: "/login"
    ui_action: "click"
    ui_target: "button.clear-session-email, button.clear-session-npub, button.clear-session-sso"
    tip: "Clearing a session does not delete your account. You can log back in at any time."

  - id: "step-7"
    feature_id: "C47"
    title: "Update personal information"
    description: "Navigate to the identity page and update your name and address fields."
    navigation: "/identity"
    ui_action: "fill"
    ui_target: "form.identity-form"
    fields:
      - "First name"
      - "Last name"
      - "Street address"
      - "City"
      - "Zip / Postal code"
      - "Country"
    tip: "This information is used as the default shipping address for future orders."

  - id: "step-8"
    feature_id: "C47"
    title: "Save personal information"
    description: "Click the save button to persist your updated profile."
    navigation: "/identity"
    ui_action: "click"
    ui_target: "button[type='submit']"

  - id: "step-9"
    feature_id: "C48"
    title: "Toggle newsletter preferences"
    description: "Enable or disable newsletter subscription to control whether you receive marketing emails from the shop."
    navigation: "/identity"
    ui_action: "check"
    ui_target: "input[name='newsletter']"
    tip: "You can unsubscribe at any time by returning to this page and unchecking the option."
