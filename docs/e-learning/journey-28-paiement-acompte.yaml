journey_id: "journey-28"
title: "Deposit and partial payments"
persona: "mixed"
description: "Configure deposit payments on products and experience the customer flow for paying a deposit and settling the remaining balance later"
prerequisites:
  - "Admin access to the store"
  - "At least one published product"
  - "A working payment method configured"
steps:
  - id: "step-1"
    feature_id: "A19"
    title: "Enable deposit payments on a product"
    description: "Navigate to a product editor, check Allow partial deposit, and set the deposit percentage or fixed amount that customers can pay upfront"
    navigation: "/admin/product/[id]"
    ui_action: "check"
    ui_target: "checkbox[name='allowPartialDeposit'], input[name='depositPercentage'] or input[name='depositAmount']"
    tip: "A percentage-based deposit scales with product price changes, while a fixed amount gives you precise control"

  - id: "step-2"
    feature_id: "C09"
    title: "Customer chooses deposit or full payment"
    description: "(Customer) On the product page, select either Pay deposit or Pay full price before adding the item to the cart"
    navigation: "/product/[slug]"
    ui_action: "select"
    ui_target: "deposit option selector (Pay deposit / Pay full price)"
    tip: "The deposit amount and remaining balance are clearly displayed so the customer knows exactly what they owe"

  - id: "step-3"
    feature_id: "C17"
    title: "Customer reviews deposit in cart"
    description: "(Customer) Navigate to the cart to view the deposit amount, the full product price, and the remaining balance that will be due later"
    navigation: "/cart"
    ui_action: "scroll"
    ui_target: "cart summary showing deposit vs total and remaining balance"
    tip: "The cart clearly separates the amount due now from the amount due later"

  - id: "step-4"
    feature_id: "C09"
    title: "Customer checks out with deposit"
    description: "(Customer) Proceed to checkout and complete payment for the deposit amount only"
    navigation: "/checkout"
    ui_action: "click"
    ui_target: "button.proceed-to-payment"
    tip: "The order is confirmed once the deposit is paid - the remaining balance can be settled at any time"

  - id: "step-5"
    feature_id: "C38"
    title: "Customer pays the remaining balance"
    description: "(Customer) Later, navigate to the order payment page to pay the remaining balance and complete the full payment"
    navigation: "/order/[id]/payment/[paymentId]/pay"
    ui_action: "click"
    ui_target: "button.pay-remaining-balance"
    tip: "The customer receives a reminder or can find the outstanding balance in their order history"
