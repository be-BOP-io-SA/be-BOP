journey_id: "journey-17"
title: "Configure delivery fees"
persona: "owner"
description: "Set up delivery fee structure, zones, free delivery options, and mark products as physical"
prerequisites:
  - "Admin access to the back-office"
  - "At least one product created"
steps:
  - id: "step-1"
    feature_id: "A62"
    title: "Choose delivery fee type"
    description: "Navigate to delivery configuration and choose the fee type: flat rate or per-item"
    navigation: "/admin/config/delivery"
    ui_action: "select"
    ui_target: "select[name='deliveryFeeType']"
    tip: "Flat rate charges a single fee per order; per-item charges for each item in the cart"

  - id: "step-2"
    feature_id: "A62"
    title: "Add delivery zones and fees"
    description: "Add delivery zones by selecting countries and entering the corresponding delivery fees for each zone"
    navigation: "/admin/config/delivery"
    ui_action: "fill"
    ui_target: "select[name='country'], input[name='fee']"
    tip: "Group countries with similar shipping costs into the same zone to simplify management"

  - id: "step-3"
    feature_id: "A63"
    title: "Allow free delivery for POS orders"
    description: "Check the option to waive delivery fees for orders placed through the Point of Sale"
    navigation: "/admin/config/delivery"
    ui_action: "check"
    ui_target: "input[name='freeDeliveryPos']"
    tip: "Useful when POS orders are handed over in person and do not require shipping"

  - id: "step-4"
    feature_id: "A27"
    title: "Mark a product as physical"
    description: "Navigate to a product page, scroll to the Delivery section, and check the physical component checkbox"
    navigation: "/admin/product/[id]"
    ui_action: "check"
    ui_target: "input[name='physicalComponent']"
    tip: "Only products marked as physical will have delivery fees applied at checkout"
