journey_id: "journey-23"
title: "Age restriction"
persona: "mixed"
description: "Configure age restriction on the store and experience the customer-facing age verification popup"
prerequisites:
  - "Admin access to the store"
  - "At least one published product"
steps:
  - id: "step-1"
    feature_id: "A90"
    title: "Enable age restriction"
    description: "Navigate to the age restriction settings page and enable the age restriction checkbox to activate verification for visitors"
    navigation: "/admin/age-restriction"
    ui_action: "check"
    ui_target: "checkbox[name='enableAgeRestriction']"
    tip: "Once enabled, every new visitor will be prompted before they can access restricted content"

  - id: "step-2"
    feature_id: "A90"
    title: "Set minimum age"
    description: "Set the minimum age requirement (e.g. 18 or 21) that visitors must confirm they meet"
    navigation: "/admin/age-restriction"
    ui_action: "fill"
    ui_target: "input[name='minimumAge']"
    tip: "Check your local regulations to determine the correct minimum age for your products"

  - id: "step-3"
    feature_id: "A90"
    title: "Fill legal disclaimer"
    description: "Fill in the legal disclaimer text that will be shown to visitors in the age verification popup"
    navigation: "/admin/age-restriction"
    ui_action: "fill"
    ui_target: "textarea[name='legalDisclaimer']"
    tip: "Include any legally required language about age-restricted content or products"

  - id: "step-4"
    feature_id: "C10"
    title: "Customer experiences age verification"
    description: "(Customer) On any product page, the age restriction popup appears. The customer reads the legal disclaimer text and clicks Accept to continue browsing"
    navigation: "/product/[slug]"
    ui_action: "click"
    ui_target: "button.accept-age-restriction"
    tip: "If the customer declines, they will not be able to view the product or proceed with a purchase"
