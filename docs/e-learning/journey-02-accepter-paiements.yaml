journey_id: "journey-02"
title: "Accept payments"
persona: "owner"
description: "Connect payment processors and configure payment methods: Stripe, PayPal, SumUp, BTCPay Server, phoenixd, Swiss Bitcoin Pay, on-chain Bitcoin, bitcoind, LND, method ordering, confirmation thresholds, and timeouts."
prerequisites:
  - "Completed journey-01 (shop setup)"
  - "Credentials for at least one payment provider"
  - "For Bitcoin/Lightning: a running node or third-party service account"

steps:
  - id: "step-1"
    feature_id: "A93"
    title: "Connect Stripe"
    description: "Enter your Stripe API keys to accept card payments."
    navigation: "/admin/stripe"
    ui_action: "fill"
    ui_target: "form.stripe-form"
    fields:
      - "Secret Key"
      - "Public Key"
    tip: "Use test keys first (prefix sk_test_ / pk_test_) to verify the integration before going live."

  - id: "step-2"
    feature_id: "A93"
    title: "Save Stripe configuration"
    description: "Click Update to activate Stripe payments."
    navigation: "/admin/stripe"
    ui_action: "click"
    ui_target: "button[type='submit']"

  - id: "step-3"
    feature_id: "A94"
    title: "Connect PayPal"
    description: "Enter PayPal API credentials and choose sandbox or production mode."
    navigation: "/admin/paypal"
    ui_action: "fill"
    ui_target: "form.paypal-form"
    fields:
      - "Client ID"
      - "Secret"
    tip: "Toggle sandbox mode on for testing. Remember to switch it off before going live."

  - id: "step-4"
    feature_id: "A94"
    title: "Toggle PayPal sandbox mode"
    description: "Enable or disable sandbox mode depending on whether you are testing or in production."
    navigation: "/admin/paypal"
    ui_action: "check"
    ui_target: "input[name='sandbox']"

  - id: "step-5"
    feature_id: "A94"
    title: "Save PayPal configuration"
    description: "Click Update to activate PayPal payments."
    navigation: "/admin/paypal"
    ui_action: "click"
    ui_target: "button[type='submit']"

  - id: "step-6"
    feature_id: "A95"
    title: "Connect SumUp"
    description: "Enter SumUp API credentials for in-person card terminal payments."
    navigation: "/admin/sumup"
    ui_action: "fill"
    ui_target: "form.sumup-form"
    fields:
      - "API Key"
      - "Merchant Code"
    tip: "SumUp is ideal for point-of-sale scenarios with a physical card reader."

  - id: "step-7"
    feature_id: "A95"
    title: "Save SumUp configuration"
    description: "Click Update to activate SumUp payments."
    navigation: "/admin/sumup"
    ui_action: "click"
    ui_target: "button[type='submit']"

  - id: "step-8"
    feature_id: "A96"
    title: "Connect BTCPay Server"
    description: "Link your self-hosted BTCPay Server instance to accept Bitcoin and Lightning payments."
    navigation: "/admin/btcpay-server"
    ui_action: "fill"
    ui_target: "form.btcpay-form"
    fields:
      - "API Key"
      - "Store ID"
      - "URL"
    tip: "The URL should point to your BTCPay Server instance, e.g. https://btcpay.yourdomain.com."

  - id: "step-9"
    feature_id: "A96"
    title: "Save BTCPay Server configuration"
    description: "Click Update to activate BTCPay Server payments."
    navigation: "/admin/btcpay-server"
    ui_action: "click"
    ui_target: "button[type='submit']"

  - id: "step-10"
    feature_id: "A97"
    title: "Connect phoenixd"
    description: "Enter phoenixd connection details for Lightning Network payments via the ACINQ phoenix daemon."
    navigation: "/admin/phoenixd"
    ui_action: "fill"
    ui_target: "form.phoenixd-form"
    fields:
      - "URL"
      - "HTTP Password"
    tip: "Click Detect to auto-discover node capabilities before saving."

  - id: "step-11"
    feature_id: "A97"
    title: "Detect or save phoenixd configuration"
    description: "Click Detect to verify connectivity, then Update to save."
    navigation: "/admin/phoenixd"
    ui_action: "click"
    ui_target: "button.detect-btn, button[type='submit']"

  - id: "step-12"
    feature_id: "A98"
    title: "Connect Swiss Bitcoin Pay"
    description: "Enter Swiss Bitcoin Pay configuration to accept Bitcoin payments through their service."
    navigation: "/admin/swiss-bitcoin-pay"
    ui_action: "fill"
    ui_target: "form.swiss-bitcoin-pay-form"

  - id: "step-13"
    feature_id: "A99"
    title: "Configure on-chain Bitcoin (nodeless)"
    description: "Set up direct on-chain Bitcoin acceptance without a full node by providing your extended public key."
    navigation: "/admin/bitcoin-nodeless"
    ui_action: "fill"
    ui_target: "form.bitcoin-nodeless-form"
    fields:
      - "BIP standard (select)"
      - "zpub key"
      - "Block explorer URL"
    tip: "Use a dedicated zpub from a hardware wallet. Never reuse keys across services."

  - id: "step-14"
    feature_id: "A100"
    title: "Connect bitcoind"
    description: "Enter RPC credentials to connect to a local or remote bitcoind full node."
    navigation: "/admin/bitcoind"
    ui_action: "fill"
    ui_target: "form.bitcoind-form"
    fields:
      - "RPC Host"
      - "RPC Port"
      - "RPC Username"
      - "RPC Password"

  - id: "step-15"
    feature_id: "A101"
    title: "Connect LND"
    description: "Enter LND node connection details for Lightning Network payments."
    navigation: "/admin/lnd"
    ui_action: "fill"
    ui_target: "form.lnd-form"
    fields:
      - "Node host"
      - "Macaroon (hex)"
      - "TLS certificate"
    tip: "Use an invoice-scoped macaroon for least-privilege access."

  - id: "step-16"
    feature_id: "A75"
    title: "Reorder payment methods"
    description: "Drag and drop payment methods to set the order in which they appear to customers at checkout."
    navigation: "/admin/config"
    ui_action: "click"
    ui_target: "sortable-list.payment-methods"
    tip: "Place the most popular payment method at the top for best conversion."

  - id: "step-17"
    feature_id: "A76"
    title: "Set confirmation thresholds"
    description: "Define how many blockchain confirmations are required before an on-chain Bitcoin payment is considered final."
    navigation: "/admin/config/confirmation-threshold"
    ui_action: "fill"
    ui_target: "input[name='confirmationThreshold']"
    tip: "1 confirmation is usually sufficient for small amounts. Use 3-6 for larger orders."

  - id: "step-18"
    feature_id: "A55"
    title: "Set payment timeout"
    description: "Configure how long a customer has to complete a payment before the order is cancelled."
    navigation: "/admin/config"
    ui_action: "fill"
    ui_target: "input[name='paymentTimeout']"
    tip: "15-30 minutes is typical. Too short may frustrate customers; too long ties up inventory."
