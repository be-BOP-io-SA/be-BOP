journey_id: "journey-09"
title: "Sell at point of sale with touch screen"
persona: "owner"
description: "Set up and operate the point-of-sale touch interface: open a session, create tabs, process payments, print kitchen tickets, and close with reporting."
prerequisites:
  - "journey-01 (store setup)"
  - "journey-02 (product catalogue with at least one product)"
  - "A touch-enabled device or desktop browser"
steps:
  - id: "step-1"
    feature_id: "A89"
    title: "Configure POS settings"
    description: "Navigate to POS admin and configure tags and favourite products for quick access on the touch screen."
    navigation: "/admin/pos"
    ui_action: "fill"
    ui_target: "input[name='tags'], input[name='favorites']"
    tip: "Favourite products appear at the top of the touch screen for faster service."

  - id: "step-2"
    feature_id: "A102"
    title: "Configure POS payment methods"
    description: "Navigate to POS payments configuration and enable the payment methods accepted at the point of sale."
    navigation: "/admin/pos-payments"
    ui_action: "check"
    ui_target: "input[type='checkbox'].payment-method"
    tip: "You can enable cash, card, Lightning, and other methods independently for POS."

  - id: "step-3"
    feature_id: "A120"
    title: "Open a POS session"
    description: "Navigate to the POS page and click 'Open session' to start accepting orders."
    navigation: "/pos"
    ui_action: "click"
    ui_target: "button.open-session"
    tip: "A session must be open before you can access the touch screen at /pos/touch."

  - id: "step-4"
    feature_id: "A121"
    title: "Browse products on the touch screen"
    description: "Navigate to the touch interface, browse products by category or use the search bar to find items."
    navigation: "/pos/touch"
    ui_action: "click"
    ui_target: "button.category-tab, input.search-bar"
    tip: "Tap a category tab to filter products, or type a product name in the search bar."

  - id: "step-5"
    feature_id: "A122"
    title: "Create an order tab"
    description: "Click the 'New tab' button to create a new order tab and give it a name (e.g. table number or customer name)."
    navigation: "/pos/touch"
    ui_action: "click"
    ui_target: "button.new-tab"
    tip: "Tabs let you manage multiple concurrent orders, useful for table service."

  - id: "step-6"
    feature_id: "A123"
    title: "Add products to a tab"
    description: "Tap a product to add it to the current tab. Use +/- buttons to adjust quantity and add notes if needed."
    navigation: "/pos/touch"
    ui_action: "click"
    ui_target: "button.product-tile, button.qty-plus, button.qty-minus, input.item-note"
    tip: "Long-press a product to add a note such as dietary requirements or preparation instructions."

  - id: "step-7"
    feature_id: "A124"
    title: "Split a tab"
    description: "Click the 'Split' button on a tab, then drag items to move them to another tab."
    navigation: "/pos/touch"
    ui_action: "click"
    ui_target: "button.split-tab"
    tip: "Splitting is useful when customers want to pay separately for their items."

  - id: "step-8"
    feature_id: "A125"
    title: "Process payment"
    description: "Click 'Proceed to payment' and select one or more payment methods to settle the tab."
    navigation: "/pos/touch"
    ui_action: "click"
    ui_target: "button.proceed-payment, button.payment-method"
    tip: "You can split the payment across multiple methods (e.g. part cash, part card)."

  - id: "step-9"
    feature_id: "A126"
    title: "Print a kitchen ticket"
    description: "Click the 'Print kitchen ticket' button to send the order to the kitchen printer."
    navigation: "/pos/touch"
    ui_action: "click"
    ui_target: "button.print-kitchen-ticket"
    tip: "Kitchen tickets are mainly useful for food-service scenarios with a separate preparation area."

  - id: "step-10"
    feature_id: "A127"
    title: "View intra-day sales report (X ticket)"
    description: "Navigate to the X ticket page to view a real-time sales summary for the current session."
    navigation: "/pos/x-ticket"
    ui_action: "scroll"
    ui_target: "section.x-ticket-report"
    tip: "The X ticket can be viewed multiple times during the day without closing the session."

  - id: "step-11"
    feature_id: "A128"
    title: "Generate a Z ticket (end-of-day closing)"
    description: "Navigate to the closing page to generate the Z ticket which summarises all sales for the session."
    navigation: "/pos/closing"
    ui_action: "click"
    ui_target: "button.generate-z-ticket"
    tip: "The Z ticket is the official end-of-day report. It freezes the session totals."

  - id: "step-12"
    feature_id: "A129"
    title: "View past session reports"
    description: "Navigate to the POS history page to review reports from previous sessions."
    navigation: "/pos/history"
    ui_action: "scroll"
    ui_target: "table.session-history"
    tip: "Use this page to compare daily sales or investigate discrepancies."

  - id: "step-13"
    feature_id: "A130"
    title: "Forbid POS touch when session is closed"
    description: "In the admin configuration, check the option to prevent access to /pos/touch when no session is open."
    navigation: "/admin/config"
    ui_action: "check"
    ui_target: "input[name='forbidPOSTouchWhenSessionClosed']"
    tip: "This prevents accidental orders being created outside of an active POS session."

  - id: "step-14"
    feature_id: "A120"
    title: "Close the POS session"
    description: "Navigate back to the POS page and click 'Close session' to end the current session."
    navigation: "/pos"
    ui_action: "click"
    ui_target: "button.close-session"
    tip: "Make sure all tabs are settled before closing. A warning appears if pools are not empty."
