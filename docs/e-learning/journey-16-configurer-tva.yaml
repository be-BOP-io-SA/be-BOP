journey_id: "journey-16"
title: "Configure VAT"
persona: "owner"
description: "Set up VAT regime, custom rates, exemption reasons, and foreign delivery rules"
prerequisites:
  - "Admin access to the back-office"
  - "Knowledge of applicable VAT regulations for your jurisdiction"
steps:
  - id: "step-1"
    feature_id: "A58"
    title: "Select the VAT regime"
    description: "Navigate to the VAT section in configuration and select the VAT regime: exemption, seller country, or buyer country"
    navigation: "/admin/config"
    ui_action: "select"
    ui_target: "select[name='vatRegime']"
    tip: "Seller country applies VAT based on your location; buyer country applies VAT based on the customer location"

  - id: "step-2"
    feature_id: "A59"
    title: "Add custom VAT rates"
    description: "Navigate to the VAT configuration page, select a country, and enter the applicable rate percentage"
    navigation: "/admin/config/vat"
    ui_action: "fill"
    ui_target: "select[name='country'], input[name='rate']"
    tip: "You can add multiple rates for different countries to handle cross-border sales"

  - id: "step-3"
    feature_id: "A60"
    title: "Fill VAT exemption reason"
    description: "In the configuration page, fill in the VAT exemption reason text that will appear on invoices"
    navigation: "/admin/config"
    ui_action: "fill"
    ui_target: "input[name='vatExemptionReason']"
    tip: "This text is legally required on invoices when VAT exemption applies"

  - id: "step-4"
    feature_id: "A61"
    title: "Enable zero VAT for foreign deliveries"
    description: "Check the option to apply VAT at 0% for deliveries to foreign countries"
    navigation: "/admin/config"
    ui_action: "check"
    ui_target: "input[name='vatZeroForeignDeliveries']"
    tip: "This is commonly used for intra-EU or international B2B transactions"
