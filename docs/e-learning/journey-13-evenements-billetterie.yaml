journey_id: "journey-13"
title: "Organize events and sell tickets"
persona: "mixed"
description: "Create event schedules, generate ticket products, let customers RSVP and purchase tickets, then scan QR codes for entry."
prerequisites:
  - "journey-01 (store setup)"
  - "journey-03 (payment method configured)"
steps:
  - id: "step-1"
    feature_id: "A115"
    title: "Create a schedule"
    description: "Navigate to the schedule admin, click 'Create schedule', and fill in the schedule name and details."
    navigation: "/admin/schedule"
    ui_action: "fill"
    ui_target: "input[name='name'], textarea[name='details']"
    tip: "A schedule is a container for multiple events, like a festival programme or a weekly class timetable."

  - id: "step-2"
    feature_id: "A115"
    title: "Add events to the schedule"
    description: "Add individual events to the schedule by filling in the event name, date, time, description, and slug."
    navigation: "/admin/schedule/[id]"
    ui_action: "fill"
    ui_target: "input[name='eventName'], input[name='date'], input[name='time'], textarea[name='description'], input[name='slug']"
    tip: "Each event can have its own ticket product, capacity, and description."

  - id: "step-3"
    feature_id: "A116"
    title: "Create a ticket product from an event"
    description: "Click 'Create ticket' on an event to auto-generate a linked ticket product that customers can purchase."
    navigation: "/admin/schedule/[id]"
    ui_action: "click"
    ui_target: "button.create-ticket"
    tip: "The ticket product is created with sensible defaults. You can edit its price, description, and stock afterwards."

  - id: "step-4"
    feature_id: "C56"
    title: "(Customer) View the event schedule"
    description: "As a customer, navigate to the public schedule page to browse upcoming events."
    navigation: "/schedule/[id]"
    ui_action: "scroll"
    ui_target: "section.schedule-events"
    tip: "The schedule page shows all events in chronological order with their details."

  - id: "step-5"
    feature_id: "C57"
    title: "(Customer) RSVP to an event"
    description: "As a customer, click the 'RSVP' button on an event to register interest."
    navigation: "/schedule/[id]"
    ui_action: "click"
    ui_target: "button.rsvp"
    tip: "RSVP does not require payment. It registers the customer's intention to attend."

  - id: "step-6"
    feature_id: "C40"
    title: "(Customer) View and print tickets"
    description: "After purchasing a ticket, navigate to the order tickets page to view and print all tickets for the order."
    navigation: "/order/[id]/tickets"
    ui_action: "click"
    ui_target: "button.print-tickets"
    tip: "Each ticket includes a unique QR code that will be scanned at entry."

  - id: "step-7"
    feature_id: "C41"
    title: "(Customer) View individual ticket with QR code"
    description: "Click on a single ticket to see its full details and QR code for scanning at the event entrance."
    navigation: "/order/[id]/tickets/[ticketId]"
    ui_action: "click"
    ui_target: "a.ticket-link"
    tip: "Save or screenshot the QR code on your phone for quick entry without printing."

  - id: "step-8"
    feature_id: "A38"
    title: "(Admin) Scan and burn tickets"
    description: "Navigate to the ticket admin, scan the QR code to burn (validate) a ticket at entry. Click 'Unburn' to reverse if needed."
    navigation: "/admin/ticket"
    ui_action: "click"
    ui_target: "button.scan-qr, button.burn-ticket, button.unburn-ticket"
    tip: "A burned ticket cannot be reused. Use 'Unburn' only if a ticket was scanned by mistake."
