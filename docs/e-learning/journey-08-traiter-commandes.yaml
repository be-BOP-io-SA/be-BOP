journey_id: "journey-08"
title: "Process and manage orders"
persona: "owner"
description: "Learn to view, filter, confirm, cancel, annotate, and label orders from the admin back-office."
prerequisites:
  - "journey-01 (store setup)"
  - "At least one completed order in the system"
steps:
  - id: "step-1"
    feature_id: "A31"
    title: "Browse the order list"
    description: "Navigate to the order management page and use the available filters to find orders."
    navigation: "/admin/order"
    ui_action: "fill"
    ui_target: "input[name='orderNumber'], input[name='productAlias'], select[name='paymentMean'], input[name='label'], input[name='email'], input[name='npub']"
    tip: "You can combine multiple filters at once to narrow down results quickly."

  - id: "step-2"
    feature_id: "A31"
    title: "Paginate through orders"
    description: "Use the next/previous buttons to browse orders, displayed 50 per page."
    navigation: "/admin/order"
    ui_action: "click"
    ui_target: "button.pagination-next, button.pagination-previous"
    tip: "Each page shows up to 50 orders. Use filters first to reduce the set before paginating."

  - id: "step-3"
    feature_id: "A32"
    title: "View order details"
    description: "Click on an order number to open the detail view showing products, customer info, shipping address, and current status."
    navigation: "/admin/order"
    ui_action: "click"
    ui_target: "a.order-number-link"
    tip: "The detail view centralises all information about a single order in one place."

  - id: "step-4"
    feature_id: "A34"
    title: "Confirm a bank-transfer payment"
    description: "For orders paid by bank transfer, click the 'Confirm payment' button once you have verified the funds arrived."
    navigation: "/admin/order/[id]"
    ui_action: "click"
    ui_target: "button.confirm-payment"
    tip: "Only bank-transfer orders show this button. Card and Lightning payments are confirmed automatically."

  - id: "step-5"
    feature_id: "A33"
    title: "Cancel an order"
    description: "Click the 'Cancel order' button. Stock quantities are automatically restored for cancelled orders."
    navigation: "/admin/order/[id]"
    ui_action: "click"
    ui_target: "button.cancel-order"
    tip: "Cancellation is irreversible. Stock is restored immediately upon cancellation."

  - id: "step-6"
    feature_id: "A35"
    title: "Add a note to the order"
    description: "Click the 'View order notes' button, then type and save a note for internal reference."
    navigation: "/admin/order/[id]"
    ui_action: "fill"
    ui_target: "textarea.order-note"
    tip: "Notes are visible only to admins and are useful for tracking follow-ups or special requests."

  - id: "step-7"
    feature_id: "A36"
    title: "Forward the receipt"
    description: "Click the 'Forward receipt' button and choose whether to send via email or Nostr channel."
    navigation: "/admin/order/[id]"
    ui_action: "click"
    ui_target: "button.forward-receipt"
    tip: "Make sure the customer has a valid email or Nostr npub before forwarding."

  - id: "step-8"
    feature_id: "A37"
    title: "Assign labels to an order line"
    description: "Click the '+' button on an order line, then select one or more labels to assign."
    navigation: "/admin/order/[id]"
    ui_action: "click"
    ui_target: "button.add-label"
    tip: "Labels help you categorise and filter orders later. Create labels first if none exist."

  - id: "step-9"
    feature_id: "A50"
    title: "Create a label"
    description: "Navigate to the label management page and create a new label with a name, colour, and icon."
    navigation: "/admin/label"
    ui_action: "fill"
    ui_target: "input[name='name'], input[name='color'], select[name='icon']"
    tip: "Choose distinct colours so labels are easy to tell apart at a glance in the order list."
