journey_id: "journey-10"
title: "Build store pages with CMS"
persona: "owner"
description: "Create and customise store pages using the CMS: add widgets, translate content, configure SEO, and set up navigation layout."
prerequisites:
  - "journey-01 (store setup)"
  - "journey-02 (at least one product created)"
  - "At least one picture uploaded for sliders and galleries"
steps:
  - id: "step-1"
    feature_id: "A41"
    title: "Create a new CMS page"
    description: "Navigate to the CMS admin, click 'Add page', and fill in the page slug, page title, and short description."
    navigation: "/admin/cms"
    ui_action: "fill"
    ui_target: "input[name='slug'], input[name='title'], textarea[name='shortDescription']"
    tip: "The slug becomes the URL path (e.g. slug 'about' gives /about). Keep it short and lowercase."

  - id: "step-2"
    feature_id: "A41"
    title: "Set page options"
    description: "Check the desired options: Full screen, Available in Maintenance mode, Hide from search engines, Add custom meta tag."
    navigation: "/admin/cms/[slug]"
    ui_action: "check"
    ui_target: "input[name='fullScreen'], input[name='maintenanceMode'], input[name='hideFromSearchEngines'], input[name='customMetaTag']"
    tip: "Enable 'Available in Maintenance mode' for pages like legal notices that must remain accessible."

  - id: "step-3"
    feature_id: "A41"
    title: "Add widgets to page content"
    description: "Fill the page content area using widget syntax to embed products, pictures, sliders, tags, forms, countdowns, and more."
    navigation: "/admin/cms/[slug]"
    ui_action: "fill"
    ui_target: "textarea[name='content']"
    tip: "Available widgets: [Product=slug], [Picture=slug], [Slider=slug], [Tag=slug], [TagProducts=slug], [Form=slug], [Countdown=slug]."

  - id: "step-4"
    feature_id: "A42"
    title: "Translate page content"
    description: "Switch to each language tab and fill in the translated title, description, and content."
    navigation: "/admin/cms/[slug]"
    ui_action: "click"
    ui_target: "button.language-tab"
    tip: "Each language tab is independent. Widgets like [Product=slug] automatically render in the visitor's language."

  - id: "step-5"
    feature_id: "A43"
    title: "Configure page SEO"
    description: "Check 'Hide from search engines' if needed and add custom meta tags for fine-grained SEO control."
    navigation: "/admin/cms/[slug]"
    ui_action: "check"
    ui_target: "input[name='hideFromSearchEngines'], input[name='customMetaTag']"
    tip: "Custom meta tags let you set Open Graph properties for social-media previews."

  - id: "step-6"
    feature_id: "A119"
    title: "Configure site layout"
    description: "Navigate to the layout admin and configure the top bar, navbar, and footer sections of your store."
    navigation: "/admin/layout"
    ui_action: "fill"
    ui_target: "input[name='topBar'], input[name='navbar'], input[name='footer']"
    tip: "The layout applies globally to all pages. Link your CMS pages in the navbar for site-wide navigation."

  - id: "step-7"
    feature_id: "A109"
    title: "Create a tag"
    description: "Navigate to tags admin and create a tag with a name, slug, family, title, and call-to-action buttons."
    navigation: "/admin/tags"
    ui_action: "fill"
    ui_target: "input[name='name'], input[name='slug'], select[name='family'], input[name='title'], input[name='cta']"
    tip: "Tags group products into themed collections. Use the [Tag=slug] widget to display a tag on any CMS page."

  - id: "step-8"
    feature_id: "A110"
    title: "Create a slider"
    description: "Navigate to slider admin, create a new slider with images, and optionally enable autoplay."
    navigation: "/admin/slider"
    ui_action: "fill"
    ui_target: "input[name='name'], input[name='images'], input[name='autoplay']"
    tip: "Use sliders on your home page to highlight promotions or seasonal products."

  - id: "step-9"
    feature_id: "A113"
    title: "Create a countdown"
    description: "Navigate to countdown admin and create a countdown timer with a target date."
    navigation: "/admin/countdown"
    ui_action: "fill"
    ui_target: "input[name='name'], input[name='targetDate']"
    tip: "Countdowns create urgency. Embed them on CMS pages with [Countdown=slug]."

  - id: "step-10"
    feature_id: "A114"
    title: "Create a gallery"
    description: "Navigate to gallery admin and create an image gallery by selecting multiple images."
    navigation: "/admin/gallery"
    ui_action: "fill"
    ui_target: "input[name='name'], input[name='images']"
    tip: "Galleries are ideal for showcasing product photos or event images."

  - id: "step-11"
    feature_id: "A52"
    title: "Configure global SEO settings"
    description: "Navigate to the SEO admin page and configure store-wide SEO defaults (title template, description, etc.)."
    navigation: "/admin/seo"
    ui_action: "fill"
    ui_target: "input[name='titleTemplate'], textarea[name='defaultDescription']"
    tip: "Global SEO settings act as fallbacks when individual pages do not specify their own meta tags."

  - id: "step-12"
    feature_id: "A29"
    title: "Add CMS content to a product page"
    description: "On a product edit page, scroll to the CMS zones and fill the 'before' and 'after' content areas. Check 'Hide on mobile' if needed."
    navigation: "/admin/product/[slug]"
    ui_action: "fill"
    ui_target: "textarea[name='cmsBefore'], textarea[name='cmsAfter'], input[name='hideOnMobile']"
    tip: "Product CMS zones let you add rich content (videos, size guides, FAQs) directly on the product page."
