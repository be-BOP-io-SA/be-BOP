journey_id: "journey-12"
title: "Sell subscription products"
persona: "mixed"
description: "Create subscription-type products, configure duration and reminders, link subscriber discounts, and manage active subscriptions."
prerequisites:
  - "journey-01 (store setup)"
  - "journey-02 (product creation basics)"
  - "journey-03 (payment method configured)"
steps:
  - id: "step-1"
    feature_id: "A15"
    title: "Create a subscription product"
    description: "Navigate to the product admin, create or edit a product, and set the product type to 'Subscription'."
    navigation: "/admin/product"
    ui_action: "select"
    ui_target: "select[name='type']"
    tip: "Subscription products automatically track active subscribers and renewal dates."

  - id: "step-2"
    feature_id: "A54"
    title: "Configure subscription settings"
    description: "Navigate to the admin configuration and set the subscription duration and reminder notification settings."
    navigation: "/admin/config"
    ui_action: "fill"
    ui_target: "input[name='subscriptionDuration'], input[name='subscriptionReminder']"
    tip: "Reminders are sent before expiry so customers can renew in time."

  - id: "step-3"
    feature_id: "A44"
    title: "Create a subscriber discount"
    description: "Navigate to the discount admin and create a discount that will be exclusive to subscribers."
    navigation: "/admin/discount"
    ui_action: "fill"
    ui_target: "input[name='name'], input[name='value'], select[name='type']"
    tip: "Subscriber discounts are a strong incentive for customers to subscribe rather than make one-time purchases."

  - id: "step-4"
    feature_id: "A45"
    title: "Link discount to subscription product"
    description: "On the discount edit page, select the subscription product to link. Only active subscribers will receive this discount."
    navigation: "/admin/discount/[id]"
    ui_action: "select"
    ui_target: "select[name='subscriptionProducts']"
    tip: "A single discount can be linked to multiple subscription products."

  - id: "step-5"
    feature_id: "A15"
    title: "View active subscriptions"
    description: "On the subscription product page, open the subscriptions tab to see the list of all active subscribers."
    navigation: "/admin/product/[slug]"
    ui_action: "click"
    ui_target: "button.subscriptions-tab"
    tip: "This tab shows subscriber names, start dates, and renewal dates at a glance."

  - id: "step-6"
    feature_id: "A15"
    title: "Export subscription list"
    description: "Click the 'Export' button to download the list of active subscriptions as an Excel spreadsheet."
    navigation: "/admin/product/[slug]"
    ui_action: "click"
    ui_target: "button.export-subscriptions"
    tip: "The Excel export is useful for accounting, mailing lists, or integration with external tools."
