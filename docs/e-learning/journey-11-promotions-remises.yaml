journey_id: "journey-11"
title: "Create promotions and discounts"
persona: "owner"
description: "Set up discount codes and promotional offers with percentage or free-product rewards, validity periods, and product targeting."
prerequisites:
  - "journey-01 (store setup)"
  - "journey-02 (at least one product created)"
steps:
  - id: "step-1"
    feature_id: "A44"
    title: "Create a new discount"
    description: "Navigate to the discount admin, click 'Add discount', and choose the discount type: percentage off or free product."
    navigation: "/admin/discount"
    ui_action: "click"
    ui_target: "button.add-discount, select[name='type']"
    tip: "Percentage discounts reduce the price; free-product discounts add a bonus item to the cart at no extra cost."

  - id: "step-2"
    feature_id: "A44"
    title: "Fill discount details"
    description: "Enter the discount name and value (percentage amount or the slug of the free product)."
    navigation: "/admin/discount/[id]"
    ui_action: "fill"
    ui_target: "input[name='name'], input[name='value']"
    tip: "The discount name is visible to customers in the cart, so choose a clear, descriptive label."

  - id: "step-3"
    feature_id: "A46"
    title: "Set validity period"
    description: "Set a start date and end date to define when the discount is active."
    navigation: "/admin/discount/[id]"
    ui_action: "fill"
    ui_target: "input[name='startDate'], input[name='endDate']"
    tip: "Leave dates empty for a discount with no expiry. Expired discounts are automatically deactivated."

  - id: "step-4"
    feature_id: "A47"
    title: "Link discount to products"
    description: "Select specific products that the discount applies to, or choose 'entire catalogue' for a store-wide promotion."
    navigation: "/admin/discount/[id]"
    ui_action: "select"
    ui_target: "select[name='products']"
    tip: "Targeting specific products lets you run focused promotions without discounting your entire inventory."

  - id: "step-5"
    feature_id: "A45"
    title: "Link discount to subscriptions"
    description: "If applicable, link the discount to subscription products so that subscribers receive a special rate."
    navigation: "/admin/discount/[id]"
    ui_action: "select"
    ui_target: "select[name='subscriptionProducts']"
    tip: "Subscription-linked discounts reward loyal customers and encourage recurring purchases."
