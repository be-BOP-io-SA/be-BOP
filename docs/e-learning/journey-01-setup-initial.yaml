journey_id: "journey-01"
title: "First-time shop setup"
persona: "owner"
description: "Configure a new be-BOP instance from scratch: admin credentials, business identity, currencies, VAT, language, theme, S3 storage, and SMTP email."
prerequisites:
  - "A running be-BOP instance accessible via browser"
  - "Admin access (initial admin hash or first-run setup)"
  - "Business legal information at hand (VAT number, IBAN, address)"
  - "S3-compatible storage credentials"
  - "SMTP server credentials"

steps:
  - id: "step-1"
    feature_id: "A74"
    title: "Set admin password hash"
    description: "Navigate to the main configuration page and secure the admin account by setting the admin hash."
    navigation: "/admin/config"
    ui_action: "fill"
    ui_target: "input[name='adminHash']"
    tip: "Use a strong, unique passphrase. This hash protects all admin operations."

  - id: "step-2"
    feature_id: "A85"
    title: "Fill business identity"
    description: "Enter your legal business information so it appears on invoices, receipts, and legal pages."
    navigation: "/admin/identity"
    ui_action: "fill"
    ui_target: "form.identity-form"
    fields:
      - "Business name"
      - "VAT Number"
      - "Street"
      - "Country"
      - "City"
      - "Zip"
      - "Email"
      - "Phone"
      - "IBAN"
      - "BIC"
    tip: "Double-check the VAT number format for your country. IBAN and BIC are used for bank-transfer payment instructions."

  - id: "step-3"
    feature_id: "A85"
    title: "Save business identity"
    description: "Click the Update button to persist your business identity."
    navigation: "/admin/identity"
    ui_action: "click"
    ui_target: "button[type='submit']"

  - id: "step-4"
    feature_id: "A86"
    title: "Configure physical shop details"
    description: "If you have a brick-and-mortar location, enter its public-facing information."
    navigation: "/admin/physical-shop"
    ui_action: "fill"
    ui_target: "form.physical-shop-form"
    fields:
      - "Shop name"
      - "Address"
      - "Opening hours"
    tip: "Opening hours are displayed on the storefront. Use a clear format such as 'Mon-Fri 09:00-18:00'."

  - id: "step-5"
    feature_id: "A86"
    title: "Save physical shop details"
    description: "Click Update to save the physical shop configuration."
    navigation: "/admin/physical-shop"
    ui_action: "click"
    ui_target: "button[type='submit']"

  - id: "step-6"
    feature_id: "A57"
    title: "Set currencies"
    description: "Choose the currencies your shop operates in. The main currency is used for display, secondary for alternative pricing, and accounting currency for bookkeeping."
    navigation: "/admin/config"
    ui_action: "select"
    ui_target: "select[name='mainCurrency'], select[name='secondaryCurrency'], select[name='priceReferenceCurrency'], select[name='accountingCurrency']"
    fields:
      - "Main Currency"
      - "Secondary Currency"
      - "Price reference currency"
      - "Accounting currency"
    tip: "If you accept Bitcoin, consider setting BTC or SAT as a secondary currency."

  - id: "step-7"
    feature_id: "A58"
    title: "Select VAT regime"
    description: "Choose the VAT regime that matches your tax jurisdiction and business status."
    navigation: "/admin/config"
    ui_action: "select"
    ui_target: "select[name='vatCountry']"
    tip: "This determines which VAT rates are available when creating products."

  - id: "step-8"
    feature_id: "A77"
    title: "Enable languages"
    description: "Toggle on every language you want your storefront to support."
    navigation: "/admin/language"
    ui_action: "check"
    ui_target: "input[type='checkbox'].language-toggle"
    tip: "You can always add more languages later. Each enabled language will require translated content for products and pages."

  - id: "step-9"
    feature_id: "A78"
    title: "Set default language"
    description: "Select the language shown to visitors who have no language preference set."
    navigation: "/admin/language"
    ui_action: "select"
    ui_target: "select[name='defaultLanguage']"

  - id: "step-10"
    feature_id: "A48"
    title: "Create a theme"
    description: "Design your storefront appearance by creating a new theme with custom colors and fonts for header, navbar, footer, and body."
    navigation: "/admin/theme"
    ui_action: "click"
    ui_target: "button.create-theme"
    tip: "Start with colors that match your brand. You can fine-tune fonts and spacing afterward."

  - id: "step-11"
    feature_id: "A48"
    title: "Customize theme settings"
    description: "Fill in color values and font selections for each section of the storefront."
    navigation: "/admin/theme"
    ui_action: "fill"
    ui_target: "form.theme-form"
    fields:
      - "Header background color"
      - "Header text color"
      - "Navbar background color"
      - "Navbar text color"
      - "Footer background color"
      - "Footer text color"
      - "Body background color"
      - "Body text color"
      - "Font family"

  - id: "step-12"
    feature_id: "A49"
    title: "Activate theme"
    description: "Click the activate button to make the newly created theme live on the storefront."
    navigation: "/admin/theme"
    ui_action: "click"
    ui_target: "button.activate-theme"
    tip: "Only one theme can be active at a time. The previous theme is preserved and can be re-activated later."

  - id: "step-13"
    feature_id: "A92"
    title: "Configure S3 storage"
    description: "Set up S3-compatible object storage for product images, digital downloads, and other media."
    navigation: "/admin/s3"
    ui_action: "fill"
    ui_target: "form.s3-form"
    fields:
      - "Endpoint"
      - "Bucket"
      - "Access Key"
      - "Secret Key"
      - "Region"
    tip: "Works with AWS S3, MinIO, Scaleway, or any S3-compatible provider."

  - id: "step-14"
    feature_id: "A103"
    title: "Configure SMTP email"
    description: "Set up outgoing email so the shop can send order confirmations, password resets, and notifications."
    navigation: "/admin/smtp"
    ui_action: "fill"
    ui_target: "form.smtp-form"
    fields:
      - "Host"
      - "Port"
      - "Username"
      - "Password"
      - "From email"
      - "From name"
    tip: "Send a test email after saving to verify the configuration works."
