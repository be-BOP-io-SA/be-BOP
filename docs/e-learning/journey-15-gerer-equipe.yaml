journey_id: "journey-15"
title: "Manage team access"
persona: "owner"
description: "Create roles with granular permissions and add team members with recovery options"
prerequisites:
  - "Admin access to the back-office"
  - "At least one team member to onboard"
steps:
  - id: "step-1"
    feature_id: "A81"
    title: "Start creating a new role"
    description: "Navigate to the role creation page and fill in the Role ID and Role name fields"
    navigation: "/admin/arm/role/new"
    ui_action: "fill"
    ui_target: "input[name='roleId'], input[name='roleName']"
    tip: "Choose a short, descriptive Role ID like 'shop-manager' or 'content-editor'"

  - id: "step-2"
    feature_id: "A81"
    title: "Define access paths for the role"
    description: "Fill in Write access paths (e.g. /admin/*), Read access paths, and Forbidden access paths to control what this role can do"
    navigation: "/admin/arm/role/new"
    ui_action: "fill"
    ui_target: "textarea[name='writeAccess'], textarea[name='readAccess'], textarea[name='forbiddenAccess']"
    tip: "Use wildcard patterns like /admin/product/* to grant access to all product pages"

  - id: "step-3"
    feature_id: "A81"
    title: "Save the new role"
    description: "Click the Save button to create the role with the defined permissions"
    navigation: "/admin/arm/role/new"
    ui_action: "click"
    ui_target: "button[type='submit']"

  - id: "step-4"
    feature_id: "A80"
    title: "Start creating a new user"
    description: "Navigate to the user creation page and fill in the Login and Alias fields"
    navigation: "/admin/arm/user/new"
    ui_action: "fill"
    ui_target: "input[name='login'], input[name='alias']"
    tip: "The Login is used for authentication, the Alias is the display name"

  - id: "step-5"
    feature_id: "A82"
    title: "Assign a role to the user"
    description: "Select the appropriate role from the Role dropdown to assign permissions"
    navigation: "/admin/arm/user/new"
    ui_action: "select"
    ui_target: "select[name='role']"

  - id: "step-6"
    feature_id: "A83"
    title: "Set recovery options"
    description: "Fill in the Recovery email and/or Recovery npub so the user can regain access if needed"
    navigation: "/admin/arm/user/new"
    ui_action: "fill"
    ui_target: "input[name='recoveryEmail'], input[name='recoveryNpub']"
    tip: "Providing at least one recovery method is strongly recommended"

  - id: "step-7"
    feature_id: "A80"
    title: "Save the new user"
    description: "Click Save to create the user account with the assigned role"
    navigation: "/admin/arm/user/new"
    ui_action: "click"
    ui_target: "button[type='submit']"

  - id: "step-8"
    feature_id: "A84"
    title: "Disable a user account"
    description: "To disable a user, navigate to their profile page and toggle the Status to disabled"
    navigation: "/admin/arm/user/[id]"
    ui_action: "click"
    ui_target: "input[name='status'], button[type='submit']"
    tip: "Disabling a user revokes their access without deleting their account"
