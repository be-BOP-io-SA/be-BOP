journey_id: "journey-21"
title: "Customer authentication methods"
persona: "mixed"
description: "Set up OAuth providers as an owner, then authenticate as a customer via email magic link, Nostr npub, or OAuth"
prerequisites:
  - "Admin access to the back-office (for OAuth setup)"
  - "OAuth provider credentials (Client ID, Client Secret) if using OAuth"
steps:
  - id: "step-1"
    feature_id: "A91"
    title: "Add an OAuth provider"
    description: "Navigate to OAuth settings, click Add provider, and fill in Provider name, Client ID, Client Secret, and Issuer URL"
    navigation: "/admin/oauth"
    ui_action: "fill"
    ui_target: "input[name='providerName'], input[name='clientId'], input[name='clientSecret'], input[name='issuerUrl']"
    tip: "You can find these credentials in your OAuth provider developer console"

  - id: "step-2"
    feature_id: "A91"
    title: "Select the provider type"
    description: "Select the provider type from the available options: Google, Facebook, Twitter, GitHub, or custom OIDC"
    navigation: "/admin/oauth"
    ui_action: "select"
    ui_target: "select[name='providerType']"
    tip: "Custom OIDC works with any OpenID Connect-compatible identity provider"

  - id: "step-3"
    feature_id: "A91"
    title: "Save the OAuth provider"
    description: "Click Save to register the OAuth provider and make it available on the login page"
    navigation: "/admin/oauth"
    ui_action: "click"
    ui_target: "button[type='submit']"

  - id: "step-4"
    feature_id: "C43"
    title: "Log in with email magic link"
    description: "(Customer) Navigate to the login page, enter your email address, click send, open your inbox, and click the magic link to authenticate"
    navigation: "/login"
    ui_action: "fill"
    ui_target: "input[name='email'], button.send-magic-link"
    tip: "The magic link expires after a short time; check your spam folder if it does not arrive"

  - id: "step-5"
    feature_id: "C44"
    title: "Log in with Nostr npub"
    description: "(Customer) Navigate to the login page, enter your npub key, and click authenticate"
    navigation: "/login"
    ui_action: "fill"
    ui_target: "input[name='npub'], button.authenticate-npub"
    tip: "You can use a Nostr browser extension like nos2x to auto-fill your npub"

  - id: "step-6"
    feature_id: "C45"
    title: "Log in with OAuth provider"
    description: "(Customer) Navigate to the login page, click the desired OAuth provider button, and authorize on the provider page"
    navigation: "/login"
    ui_action: "click"
    ui_target: "button.oauth-provider"
    tip: "You will be redirected to the provider and back automatically after authorization"
