journey_id: "journey-26"
title: "Interact and exchange with customers"
persona: "mixed"
description: "Set up contact forms, email and Nostr notifications, order notes, bot interactions, and order labeling for comprehensive customer communication"
prerequisites:
  - "Admin access to the store"
  - "SMTP server credentials (for email features)"
  - "Nostr nsec key and relay URLs (for Nostr features)"
  - "At least one completed order (for notes and receipt forwarding)"
steps:
  - id: "step-1"
    feature_id: "A112"
    title: "Create a contact form"
    description: "Navigate to the form administration page, click Add contact form, and fill in the Title, Slug, and Target email or npub"
    navigation: "/admin/form"
    ui_action: "click"
    ui_target: "button.add-contact-form"
    tip: "You can create multiple forms for different purposes such as support, feedback, or partnership inquiries"

  - id: "step-2"
    feature_id: "A112"
    title: "Configure form options"
    description: "Configure the form options including the From field, disclaimer text, Subject line, and Content field settings"
    navigation: "/admin/form/[id]"
    ui_action: "fill"
    ui_target: "input[name='from'], textarea[name='disclaimer'], input[name='subject'], textarea[name='content']"
    tip: "The disclaimer text appears above the form and can be used for privacy policy or response time expectations"

  - id: "step-3"
    feature_id: "A112"
    title: "Embed form in a CMS page"
    description: "Integrate the contact form in a CMS page using the shortcode [Form=slug]"
    navigation: "/admin/cms"
    ui_action: "fill"
    ui_target: "CMS content editor"
    tip: "Replace 'slug' with the slug you defined when creating the form"

  - id: "step-4"
    feature_id: "C60"
    title: "Customer submits the contact form"
    description: "(Customer) Navigate to the form page or the CMS page where it is embedded, fill in the required fields, and submit the form"
    navigation: "/form/[id]"
    ui_action: "click"
    ui_target: "button.submit-form"
    tip: "The form submission is sent to the target email or npub configured by the store owner"

  - id: "step-5"
    feature_id: "A103"
    title: "Configure SMTP server"
    description: "Navigate to the SMTP configuration page and enter the SMTP server host, port, username, and password for outgoing email"
    navigation: "/admin/smtp"
    ui_action: "fill"
    ui_target: "input[name='host'], input[name='port'], input[name='username'], input[name='password']"
    tip: "Use a dedicated transactional email service for better deliverability"

  - id: "step-6"
    feature_id: "A87"
    title: "Customize email templates"
    description: "Navigate to the template editor and customize email templates using available variables for dynamic content"
    navigation: "/admin/template"
    ui_action: "fill"
    ui_target: "email template editor"
    tip: "Available variables are listed on the page - use them to personalize emails with order details, customer names, etc."

  - id: "step-7"
    feature_id: "A104"
    title: "Send a test email"
    description: "Navigate to the email testing page and send a test email to verify your SMTP configuration and template rendering"
    navigation: "/admin/email"
    ui_action: "click"
    ui_target: "button.send-test-email"
    tip: "Check your spam folder if the test email does not arrive - you may need to configure SPF/DKIM records"

  - id: "step-8"
    feature_id: "A69"
    title: "Enable admin email copy for orders"
    description: "Navigate to the general configuration page and enable the option to receive an email copy for every new order"
    navigation: "/admin/config"
    ui_action: "check"
    ui_target: "checkbox[name='adminEmailCopy']"
    tip: "This ensures you are notified immediately when a new order is placed"

  - id: "step-9"
    feature_id: "A36"
    title: "Forward a receipt"
    description: "From an order detail page, click Forward receipt to send the receipt to the customer via email or Nostr"
    navigation: "/admin/order/[id]"
    ui_action: "click"
    ui_target: "button.forward-receipt"
    tip: "Useful when a customer did not receive the original receipt or requests a copy"

  - id: "step-10"
    feature_id: "A35"
    title: "Add an admin note to an order"
    description: "From an order detail page, click View notes and add a note to keep a record of communications or internal remarks"
    navigation: "/admin/order/[id]"
    ui_action: "click"
    ui_target: "button.view-notes, button.add-note"
    tip: "Notes are visible to both the admin and the customer unless marked as internal"

  - id: "step-11"
    feature_id: "C42"
    title: "Customer adds a note to an order"
    description: "(Customer) Navigate to the order detail page and add a note to communicate with the store owner about the order"
    navigation: "/order/[id]/notes"
    ui_action: "fill"
    ui_target: "textarea[name='note'], button.submit-note"
    tip: "Customers can use notes to request changes, ask questions, or provide delivery instructions"

  - id: "step-12"
    feature_id: "A105"
    title: "Configure Nostr integration"
    description: "Navigate to the Nostr configuration page and enter your nsec key, relay URLs, and bot welcome message"
    navigation: "/admin/nostr"
    ui_action: "fill"
    ui_target: "input[name='nsec'], textarea[name='relays'], textarea[name='botMessage']"
    tip: "Use multiple relays for redundancy and better message delivery"

  - id: "step-13"
    feature_id: "C62"
    title: "Customer receives Nostr DM notifications"
    description: "(Automatic) The customer receives Nostr direct message notifications for order status updates such as confirmation, shipping, and delivery"
    navigation: ""
    ui_action: "scroll"
    ui_target: "Nostr client DM inbox"
    tip: "Customers need a Nostr-compatible client to receive these notifications"

  - id: "step-14"
    feature_id: "C64"
    title: "Customer interacts with Nostr bot"
    description: "(Customer) Send !help or !catalog commands to the store Nostr bot to browse products and get information"
    navigation: ""
    ui_action: "fill"
    ui_target: "Nostr client DM composer"
    tip: "The !help command lists all available bot commands"

  - id: "step-15"
    feature_id: "C65"
    title: "Customer completes order via Nostr bot"
    description: "(Customer) Complete an entire order through the Nostr bot conversation by selecting products and confirming the purchase"
    navigation: ""
    ui_action: "fill"
    ui_target: "Nostr client DM composer"
    tip: "This provides a fully conversational shopping experience without visiting the website"

  - id: "step-16"
    feature_id: "A50"
    title: "Create order labels"
    description: "Navigate to the label management page and create labels with a name, color, and icon for organizing orders"
    navigation: "/admin/label"
    ui_action: "fill"
    ui_target: "input[name='name'], input[name='color'], select[name='icon']"
    tip: "Use labels to categorize orders by status, priority, or any custom workflow you need"

  - id: "step-17"
    feature_id: "A37"
    title: "Assign labels to orders"
    description: "From the order list, click the + button on an order line to assign one or more labels for quick visual identification"
    navigation: "/admin/order"
    ui_action: "click"
    ui_target: "button.add-label on order row"
    tip: "Labels help you filter and sort orders at a glance in a busy order list"
