journey_id: "journey-04"
title: "Browse and buy a product"
persona: "customer"
description: "Walk through the full shopping experience: browse the catalog, filter by tag, view product details, select options, add to cart, adjust quantities, checkout with shipping and payment, and receive confirmation."
prerequisites:
  - "At least one product published in the catalog"
  - "At least one payment method configured"
  - "Storefront accessible at the shop URL"

steps:
  - id: "step-1"
    feature_id: "C02"
    title: "Browse the catalog"
    description: "Navigate to the catalog page and browse the product listing."
    navigation: "/catalog"
    ui_action: "scroll"
    ui_target: "div.product-listing"
    tip: "Products are displayed as cards with thumbnail, name, and price."

  - id: "step-2"
    feature_id: "C51"
    title: "Filter by tag or category"
    description: "Click on a tag or category label to narrow down the product listing."
    navigation: "/catalog"
    ui_action: "click"
    ui_target: "a.tag-filter, button.category-filter"
    tip: "You can combine multiple filters. Click a tag again to remove the filter."

  - id: "step-3"
    feature_id: "C03"
    title: "View product details"
    description: "Click on a product card to open its detail page showing name, description, images, and price."
    navigation: "/product/{slug}"
    ui_action: "click"
    ui_target: "a.product-card"

  - id: "step-4"
    feature_id: "C04"
    title: "Browse product images"
    description: "Click on the product image to open a zoom view or image gallery."
    navigation: "/product/{slug}"
    ui_action: "click"
    ui_target: "img.product-image, div.image-gallery"
    tip: "Swipe or use arrow buttons to navigate between images in the gallery."

  - id: "step-5"
    feature_id: "C05"
    title: "Select a product variation"
    description: "If the product has variations (size, color, etc.), select your preferred option."
    navigation: "/product/{slug}"
    ui_action: "select"
    ui_target: "select[name='variation'], div.variation-options"
    tip: "The price may adjust based on the variation selected."

  - id: "step-6"
    feature_id: "C06"
    title: "Set quantity"
    description: "Use the plus/minus buttons or type a number to set how many units you want."
    navigation: "/product/{slug}"
    ui_action: "click"
    ui_target: "button.quantity-plus, button.quantity-minus, input[name='quantity']"

  - id: "step-7"
    feature_id: "C12"
    title: "Add to cart"
    description: "Click the Add to cart button to place the product in your shopping cart."
    navigation: "/product/{slug}"
    ui_action: "click"
    ui_target: "button.add-to-cart"
    tip: "A confirmation message or cart badge update indicates the item was added successfully."

  - id: "step-8"
    feature_id: "C13"
    title: "Review cart"
    description: "Navigate to the cart page and review your items, quantities, prices, and VAT breakdown."
    navigation: "/cart"
    ui_action: "scroll"
    ui_target: "div.cart-contents"
    tip: "The VAT breakdown shows tax amounts per rate. Totals update automatically when you change quantities."

  - id: "step-9"
    feature_id: "C14"
    title: "Adjust cart quantities"
    description: "Use the plus/minus buttons next to each item to increase or decrease quantity, or remove items."
    navigation: "/cart"
    ui_action: "click"
    ui_target: "button.cart-quantity-plus, button.cart-quantity-minus"

  - id: "step-10"
    feature_id: "C19"
    title: "Fill shipping address"
    description: "Proceed to checkout and fill in the shipping address fields."
    navigation: "/checkout"
    ui_action: "fill"
    ui_target: "form.shipping-form"
    fields:
      - "Full name"
      - "Street address"
      - "City"
      - "Zip / Postal code"
      - "Country"
    tip: "The shipping address is required for physical products. Digital-only orders may skip this step."

  - id: "step-11"
    feature_id: "C22"
    title: "Select payment method"
    description: "Choose a payment method from the available options (card, PayPal, Bitcoin, Lightning, etc.)."
    navigation: "/checkout"
    ui_action: "click"
    ui_target: "div.payment-methods input[type='radio'], div.payment-methods button"
    tip: "Available methods depend on what the shop owner configured and your order currency."

  - id: "step-12"
    feature_id: "C32"
    title: "Accept terms of service"
    description: "Check the terms-of-service checkbox to confirm you agree with the shop policies."
    navigation: "/checkout"
    ui_action: "check"
    ui_target: "input[name='acceptTos']"
    tip: "You can click the link next to the checkbox to read the full terms before accepting."

  - id: "step-13"
    feature_id: "C61"
    title: "Receive order confirmation"
    description: "After successful payment, an order confirmation email is sent automatically to the address on file."
    navigation: null
    ui_action: null
    ui_target: null
    tip: "Check your spam folder if you do not see the confirmation within a few minutes."
