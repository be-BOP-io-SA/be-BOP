journey_id: "journey-24"
title: "Community engagement with gamification"
persona: "mixed"
description: "Create challenges and leaderboards to engage customers, embed them in CMS pages, and view them from the customer perspective"
prerequisites:
  - "Admin access to the store"
  - "At least one published product (for linking to challenges)"
  - "A CMS page available for embedding challenge and leaderboard widgets"
steps:
  - id: "step-1"
    feature_id: "A117"
    title: "Create a challenge"
    description: "Navigate to the challenge administration page and click Create challenge to start defining a new community challenge"
    navigation: "/admin/challenge"
    ui_action: "click"
    ui_target: "button.create-challenge"
    tip: "Challenges motivate customers to reach goals such as purchasing a set of products or reaching a spending threshold"

  - id: "step-2"
    feature_id: "A117"
    title: "Configure challenge details"
    description: "Fill in the challenge name, slug, goal description, timeline with start and end dates, and link the relevant products"
    navigation: "/admin/challenge/new"
    ui_action: "fill"
    ui_target: "input[name='name'], input[name='slug'], textarea[name='goalDescription'], input[name='startDate'], input[name='endDate'], product selector"
    tip: "Use a clear and memorable slug - it will appear in the URL and in the CMS shortcode"

  - id: "step-3"
    feature_id: "A117"
    title: "Embed challenge in a CMS page"
    description: "Open a CMS page editor and insert the shortcode [Challenge=slug] to display the challenge widget on the storefront"
    navigation: "/admin/cms"
    ui_action: "fill"
    ui_target: "CMS content editor"
    tip: "Replace 'slug' with the actual slug you defined in the previous step"

  - id: "step-4"
    feature_id: "A118"
    title: "Create a leaderboard"
    description: "Navigate to the leaderboard administration page and click Create leaderboard to set up a ranking board"
    navigation: "/admin/leaderboard"
    ui_action: "click"
    ui_target: "button.create-leaderboard"
    tip: "Leaderboards add a competitive element that encourages repeat engagement"

  - id: "step-5"
    feature_id: "A118"
    title: "Configure leaderboard details"
    description: "Fill in the leaderboard name, slug, and ranking criteria to define how participants are scored and ranked"
    navigation: "/admin/leaderboard/new"
    ui_action: "fill"
    ui_target: "input[name='name'], input[name='slug'], select[name='rankingCriteria']"
    tip: "Ranking criteria can be based on order count, total spending, or challenge completions"

  - id: "step-6"
    feature_id: "A118"
    title: "Embed leaderboard in a CMS page"
    description: "Open a CMS page editor and insert the shortcode [Leaderboard=slug] to display the leaderboard on the storefront"
    navigation: "/admin/cms"
    ui_action: "fill"
    ui_target: "CMS content editor"
    tip: "You can place the leaderboard on the same page as the challenge or on a dedicated rankings page"

  - id: "step-7"
    feature_id: "C53"
    title: "Customer views challenge progress"
    description: "(Customer) Navigate to the challenge page to view current progress, goal status, and remaining objectives"
    navigation: "/challenges/[id]"
    ui_action: "scroll"
    ui_target: "challenge progress section"
    tip: "Progress updates in real time as qualifying purchases are made"

  - id: "step-8"
    feature_id: "C54"
    title: "Customer views leaderboard rankings"
    description: "(Customer) Navigate to the leaderboard page to view current rankings and personal position"
    navigation: "/leaderboards/[id]"
    ui_action: "scroll"
    ui_target: "leaderboard rankings table"
    tip: "Customers can see how they compare to other participants and what they need to climb the ranks"
