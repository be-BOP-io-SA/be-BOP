journey_id: "journey-27"
title: "Multi-language store"
persona: "owner"
description: "Enable multiple languages, set a default language, edit translation strings, and translate CMS and product content"
prerequisites:
  - "Admin access to the store"
  - "At least one CMS page and one product created"
steps:
  - id: "step-1"
    feature_id: "A77"
    title: "Enable languages"
    description: "Navigate to the language settings page and toggle language checkboxes to enable or disable the languages available on the storefront"
    navigation: "/admin/language"
    ui_action: "check"
    ui_target: "language checkboxes"
    tip: "Only enable languages for which you can provide quality translations - a partially translated store can confuse customers"

  - id: "step-2"
    feature_id: "A78"
    title: "Set default language"
    description: "Select the default language from the dropdown to determine which language visitors see when they first arrive"
    navigation: "/admin/language"
    ui_action: "select"
    ui_target: "select[name='defaultLanguage']"
    tip: "The default language should match the primary audience of your store"

  - id: "step-3"
    feature_id: "A79"
    title: "Edit translation strings"
    description: "Click Load translations to view the JSON translation keys, edit the values as needed for your store context, and click Save"
    navigation: "/admin/language"
    ui_action: "fill"
    ui_target: "translation JSON editor, button.load-translations, button.save"
    tip: "Translation keys cover UI elements like buttons, labels, and messages - customize them to match your brand voice"

  - id: "step-4"
    feature_id: "A42"
    title: "Translate CMS page content"
    description: "Navigate to a CMS page editor, switch to a different language tab, and fill in the translated content for that language"
    navigation: "/admin/cms"
    ui_action: "fill"
    ui_target: "language tab selector, CMS content editor"
    tip: "Each language tab is independent - you can have completely different layouts and content per language"

  - id: "step-5"
    feature_id: "A28"
    title: "Translate product content"
    description: "Navigate to a product editor, switch to a different language tab, and fill in the translated product name and descriptions"
    navigation: "/admin/product/[id]"
    ui_action: "fill"
    ui_target: "language tab selector, input[name='name'], textarea[name='description']"
    tip: "Translated product names also affect the product URL slug in that language"
