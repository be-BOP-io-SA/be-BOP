journey_id: "journey-14"
title: "Sell digital downloadable products"
persona: "mixed"
description: "Upload digital files, create products with the digital flag, attach files, and let customers download after purchase."
prerequisites:
  - "journey-01 (store setup)"
  - "journey-02 (product creation basics)"
  - "journey-03 (payment method configured)"
  - "A digital file ready to upload (PDF, ZIP, audio, video, etc.)"
steps:
  - id: "step-1"
    feature_id: "A51"
    title: "Upload a digital file"
    description: "Navigate to the digital file admin, click 'New file', enter a file name, and upload the file."
    navigation: "/admin/digital-file"
    ui_action: "fill"
    ui_target: "input[name='name'], input[type='file']"
    tip: "Supported formats include PDF, ZIP, MP3, MP4, and more. The file is stored securely and only accessible after purchase."

  - id: "step-2"
    feature_id: "A14"
    title: "Create a digital product"
    description: "Navigate to the product admin, create or edit a product, and check the 'digital' option to mark it as a downloadable product."
    navigation: "/admin/product"
    ui_action: "check"
    ui_target: "input[name='digital']"
    tip: "Digital products skip the shipping step during checkout since nothing physical needs to be delivered."

  - id: "step-3"
    feature_id: "A26"
    title: "Attach digital files to the product"
    description: "In the product form, select the previously uploaded digital file(s) to attach to the product."
    navigation: "/admin/product/[slug]"
    ui_action: "select"
    ui_target: "select[name='digitalFiles']"
    tip: "You can attach multiple files to a single product, for example a PDF guide plus bonus audio files."

  - id: "step-4"
    feature_id: "C39"
    title: "(Customer) Download purchased digital file"
    description: "After completing the purchase, navigate to the download URL to retrieve the digital file."
    navigation: "/digital-file/raw/[id]"
    ui_action: "click"
    ui_target: "a.download-link"
    tip: "The download link is unique to the order. It is included in the order confirmation email or accessible from the order page."
