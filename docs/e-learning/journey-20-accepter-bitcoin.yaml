journey_id: "journey-20"
title: "Accept Bitcoin and Lightning payments"
persona: "owner"
description: "Configure one or more Bitcoin payment backends including BTCPay Server, PhoenixD, Swiss Bitcoin Pay, nodeless, bitcoind, and LND"
prerequisites:
  - "Admin access to the back-office"
  - "At least one Bitcoin payment backend available (BTCPay Server, PhoenixD, etc.)"
steps:
  - id: "step-1"
    feature_id: "A96"
    title: "Configure BTCPay Server"
    description: "Navigate to BTCPay Server settings, fill in the API Key, Store ID, and URL, then click Update"
    navigation: "/admin/btcpay-server"
    ui_action: "fill"
    ui_target: "input[name='apiKey'], input[name='storeId'], input[name='url']"
    tip: "Generate the API Key from your BTCPay Server instance under Account > API Keys"

  - id: "step-2"
    feature_id: "A97"
    title: "Configure PhoenixD"
    description: "Navigate to PhoenixD settings, fill in the URL and HTTP Password, then click Detect PhoenixD Server or Update"
    navigation: "/admin/phoenixd"
    ui_action: "fill"
    ui_target: "input[name='url'], input[name='httpPassword']"
    tip: "Use Detect PhoenixD Server to auto-fill connection details if the server is reachable"

  - id: "step-3"
    feature_id: "A98"
    title: "Configure Swiss Bitcoin Pay"
    description: "Navigate to Swiss Bitcoin Pay settings, fill in the configuration fields, and click Update"
    navigation: "/admin/swiss-bitcoin-pay"
    ui_action: "fill"
    ui_target: "input[name='swissBitcoinPayConfig']"
    tip: "Swiss Bitcoin Pay provides a simple hosted solution for accepting Bitcoin payments"

  - id: "step-4"
    feature_id: "A99"
    title: "Configure Bitcoin nodeless (BIP84)"
    description: "Navigate to Bitcoin nodeless settings, select BIP84, fill in the zpub key, set the block explorer URL, and click Update"
    navigation: "/admin/bitcoin-nodeless"
    ui_action: "fill"
    ui_target: "select[name='bipType'], input[name='zpub'], input[name='blockExplorerUrl']"
    tip: "BIP84 generates native SegWit (bc1) addresses for lower transaction fees"

  - id: "step-5"
    feature_id: "A100"
    title: "Configure bitcoind"
    description: "Navigate to bitcoind settings, fill in the RPC host, port, username, and password, then click Update"
    navigation: "/admin/bitcoind"
    ui_action: "fill"
    ui_target: "input[name='rpcHost'], input[name='rpcPort'], input[name='rpcUsername'], input[name='rpcPassword']"
    tip: "Ensure your bitcoind node has RPC enabled and the wallet loaded"

  - id: "step-6"
    feature_id: "A101"
    title: "Configure LND"
    description: "Navigate to LND settings, fill in the node connection details, and click Update"
    navigation: "/admin/lnd"
    ui_action: "fill"
    ui_target: "input[name='lndConnectionDetails']"
    tip: "You will typically need the LND REST endpoint and a macaroon for authentication"

  - id: "step-7"
    feature_id: "A76"
    title: "Set confirmation thresholds"
    description: "Navigate to confirmation threshold settings and set the number of required confirmations per amount range"
    navigation: "/admin/config/confirmation-threshold"
    ui_action: "fill"
    ui_target: "input[name='confirmationThreshold']"
    tip: "Higher-value transactions should require more confirmations for security"
