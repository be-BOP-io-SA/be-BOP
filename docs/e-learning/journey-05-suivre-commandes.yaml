journey_id: "journey-05"
title: "Track orders and download purchases"
persona: "customer"
description: "View order history, check order status, download receipts and invoices, pay pending orders, access digital downloads and event tickets, and communicate with the shop via order notes."
prerequisites:
  - "An authenticated customer account"
  - "At least one placed order"

steps:
  - id: "step-1"
    feature_id: "C34"
    title: "View order list"
    description: "Navigate to the orders page to see all your past and current orders."
    navigation: "/orders"
    ui_action: "scroll"
    ui_target: "div.order-list"
    tip: "Orders are listed with their date, status, and total amount."

  - id: "step-2"
    feature_id: "C35"
    title: "View order details"
    description: "Click on an order to see its full details: items, quantities, prices, payment status, and shipping status."
    navigation: "/order/{id}"
    ui_action: "click"
    ui_target: "a.order-row"

  - id: "step-3"
    feature_id: "C36"
    title: "Download receipt or invoice"
    description: "Click the download receipt or view invoice link to get a PDF of the order document."
    navigation: "/order/{id}"
    ui_action: "click"
    ui_target: "a.download-receipt, a.view-invoice"
    tip: "Invoices include full VAT details and are suitable for business expense reporting."

  - id: "step-4"
    feature_id: "C38"
    title: "Pay a pending order"
    description: "If an order is still pending payment, click the Pay now button to complete the transaction."
    navigation: "/order/{id}"
    ui_action: "click"
    ui_target: "button.pay-now"
    tip: "Pending orders may expire after the configured payment timeout. Pay promptly to avoid cancellation."

  - id: "step-5"
    feature_id: "C39"
    title: "Download digital products"
    description: "For orders containing digital products, click the download link to retrieve the files."
    navigation: "/order/{id}"
    ui_action: "click"
    ui_target: "a.download-link"
    tip: "Download links may have an expiration or download count limit, depending on the shop configuration."

  - id: "step-6"
    feature_id: "C40"
    title: "View event tickets"
    description: "For event orders, click View tickets to see or print your entry tickets."
    navigation: "/order/{id}"
    ui_action: "click"
    ui_target: "a.view-tickets, button.view-tickets"
    tip: "Tickets typically include a QR code for scanning at the event entrance."

  - id: "step-7"
    feature_id: "C42"
    title: "Add a note to the order"
    description: "Scroll to the notes section and add a message to communicate with the shop about this order."
    navigation: "/order/{id}"
    ui_action: "fill"
    ui_target: "textarea[name='orderNote']"
    tip: "Use notes for delivery instructions, special requests, or questions about the order."
